<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어휘 용사의 모험 - Stage 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap');

        :root {
            --bg-ocean: #d0e8f2;    
            --point-blue: #5d8aa8;   
            --accent-sand: #e6be8a;  
            --text-dark: #334756;   
            --card-bg: rgba(255, 255, 255, 0.94);
            --correct: #7da3a1;
            --wrong: #d68080;
            --rank-highlight: #ffcc00; /* 랭킹 포인트 컬러 */
        }

        * { box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #d0e8f2 0%, #5d8aa8 100%);
            color: var(--text-dark);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .geometry {
            position: absolute;
            background: var(--point-blue);
            opacity: 0.1;
            z-index: -1;
        }
        .g1 { width: 400px; height: 400px; top: -200px; left: -100px; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; animation: drift 15s infinite linear; }
        .g2 { width: 300px; height: 300px; bottom: -100px; right: -50px; background: var(--accent-sand); border-radius: 50%; opacity: 0.15; }

        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #game-box {
            width: 90%;
            max-width: 460px;
            background: var(--card-bg);
            padding: 50px 35px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
            backdrop-filter: blur(15px);
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 1s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 700; color: var(--point-blue); margin-bottom: 10px; letter-spacing: -1px; font-size: 1.7rem; }
        .subtitle { font-weight: 300; font-size: 0.9rem; color: var(--point-blue); margin-bottom: 40px; }

        #input-name {
            width: 100%;
            padding: 15px;
            border: none;
            border-bottom: 1.5px solid #bdc3c7;
            background: transparent;
            font-size: 1.1rem;
            margin-bottom: 35px;
            outline: none;
            text-align: center;
        }

        .btn {
            background: var(--point-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background: #4a6d88; transform: translateY(-3px); }

        .status { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 15px; color: #7f8c8d; }
        #timer-wrap { width: 100%; height: 2px; background: #ecf0f1; margin-bottom: 35px; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent-sand); transition: width 10s linear; }

        #q-text { font-size: 1.25rem; line-height: 1.8; margin-bottom: 35px; font-weight: 500; word-break: keep-all; }

        .opt-btn {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 18px;
            width: 100%;
            margin-bottom: 12px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-dark);
            transition: 0.3s;
        }
        .opt-btn:hover { border-color: var(--point-blue); background: #f7f9f9; }

        #feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.7;
            text-align: left;
            background: rgba(93, 138, 168, 0.05);
            border-left: 3px solid var(--point-blue);
            display: none;
        }

        /* 랭킹 스타일 추가 */
        #rank-container {
            margin: 20px 0;
            padding: 20px;
            background: rgba(93, 138, 168, 0.1);
            border-radius: 25px;
            border: 1px solid rgba(93, 138, 168, 0.2);
        }
        .rank-title { font-weight: 700; color: var(--point-blue); margin-bottom: 12px; font-size: 0.95rem; }
        .rank-item { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; }
        .rank-item:last-child { border-bottom: none; }
        .rank-item.top { color: #d48e2f; font-weight: 700; }
    </style>
</head>
<body>

    <div class="geometry g1"></div>
    <div class="geometry g2"></div>

    <div id="game-box">
        <div id="screen-start" class="screen active">
            <h1>어휘 용사의 모험</h1>
            <p class="subtitle">STAGE 2. 고요한 지혜의 바다</p>
            <input type="text" id="input-name" placeholder="용사의 이름을 입력하세요">
            <button class="btn" id="btn-start">모험 시작</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="status">
                <span>QUEST <span id="idx-view">1</span>/15</span>
                <span>LIFE <span id="hp-view">15</span></span>
            </div>
            <div id="timer-wrap"><div id="timer-bar"></div></div>
            <div id="q-text"></div>
            <div id="opt-wrap"></div>
            <div id="feedback"></div>
            <button id="btn-next" class="btn" style="display:none; margin-top:20px;">다음 구역으로 ▷</button>
        </div>

        <div id="screen-result" class="screen">
            <h1>여정의 끝</h1>
            <p id="res-score" style="font-size: 1.3rem; margin: 15px 0; font-weight: 500; color: var(--point-blue);"></p>
            
            <div id="rank-container">
                <div class="rank-title">🌊 TOP 5 OCEAN RANKERS</div>
                <div id="rank-list"></div>
            </div>

            <button class="btn" onclick="location.reload()">다시 도전하기</button>
        </div>
    </div>

    <audio id="sound-bgm" loop src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3"></audio>
    <audio id="sound-o" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sound-x" src="https://assets.mixkit.co/active_storage/sfx/21/21-preview.mp3"></audio>

<script>
    const quizData = [
        { q: "동이 친구들에게 장난을 많이 치는 개구( 장이 / 쟁이 )이다.", a: ["장이", "쟁이"], c: 1, f: "<b>정답: 쟁이</b><br>성질이나 특징을 가진 사람에게는 '-쟁이'를 씁니다. '-장이'는 기술자에게 씁니다." },
        { q: "친구와 나는 키가 ( 같고 / 갖고 ) 몸무게가 다르다.", a: ["같고", "갖고"], c: 0, f: "<b>정답: 같고</b><br>'같다'는 서로 다르지 않음을 뜻합니다." },
        { q: "지붕에서 비가 ( 센다 / 샌다 ).", a: ["센다", "샌다"], c: 1, f: "<b>정답: 샌다</b><br>액체나 기체가 틈으로 빠져나가는 것은 '새다'입니다." },
        { q: "배낭을 ( 메고 / 매고 ) 여행을 떠났다.", a: ["메고", "매고"], c: 0, f: "<b>정답: 메고</b><br>어깨에 걸치거나 올려놓는 것은 '메다'입니다." },
        { q: "유리창을 깼어. 나 ( 어떡해 / 어떻게 ).", a: ["어떡해", "어떻게"], c: 0, f: "<b>정답: 어떡해</b><br>'어떻게 해'의 줄임말로 문장 끝에 쓰입니다." },
        { q: "산 ( 너머 / 넘어 ) 마을이 보인다.", a: ["너머", "넘어"], c: 0, f: "<b>정답: 너머</b><br>경계 저쪽의 공간을 뜻할 때는 '너머'를 씁니다." },
        { q: "생선을 소금에 ( 절이다 / 저리다 ).", a: ["절이다", "저리다"], c: 0, f: "<b>정답: 절이다</b><br>소금이나 설탕에 담가 배어들게 하는 것은 '절이다'입니다." },
        { q: "꽃담이는 킁킁 냄새를 ( 맡았어요 / 맞았어요 ).", a: ["맡았어요", "맞았어요"], c: 0, f: "<b>정답: 맡았어요</b><br>코로 느끼는 것은 '맡다'입니다." },
        { q: "추석에 부모님과 송편을 ( 빗었다 / 빚었다 ).", a: ["빗었다", "빚었다"], c: 1, f: "<b>정답: 빚다</b><br>반죽을 주물러 모양을 만드는 것은 '빚다'입니다." },
        { q: "우리 집 강아지가 낯선 사람을 보고 ( 짖는다 / 짓는다 ).", a: ["짖는다", "짓는다"], c: 0, f: "<b>정답: 짖는다</b><br>동물이 소리를 내는 것은 '짖다'입니다." },
        { q: "상처가 깨끗하게 ( 나았다 / 낳았다 ).", a: ["나았다", "낳았다"], c: 0, f: "<b>정답: 나았다</b><br>병이나 상처가 고쳐지는 것은 '낫다'입니다." },
        { q: "고무줄을 길게 ( 늘이다 / 늘리다 ).", a: ["늘이다", "늘리다"], c: 0, f: "<b>정답: 늘이다</b><br>길이를 늘어나게 하는 것은 '늘이다'입니다." },
        { q: "다리미로 바지를 ( 다리다 / 달이다 ).", a: ["다리다", "달이다"], c: 0, f: "<b>정답: 다리다</b><br>옷의 구김을 펴는 것은 '다리다'입니다." },
        { q: "멸치를 간장 양념에 ( 조리다 / 졸이다 ).", a: ["조리다", "졸이다"], c: 0, f: "<b>정답: 조리다</b><br>양념이 배도록 바짝 끓이는 요리는 '조리다'입니다." },
        { q: "실력이 언니보다 내가 더 ( 낫다 / 낳다 ).", a: ["낫다", "낳다"], c: 0, f: "<b>정답: 낫다</b><br>비교 대상보다 더 좋은 것은 '낫다'입니다." }
    ];

    let currentIdx = 0;
    let score = 0;
    let timer;
    let userName = "";

    document.getElementById('btn-start').addEventListener('click', () => {
        userName = document.getElementById('input-name').value.trim() || "바다의 용사";
        const bgm = document.getElementById('sound-bgm');
        bgm.volume = 0.5; 
        bgm.play().catch(() => {});
        
        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        loadQuestion();
    });

    function loadQuestion() {
        if (currentIdx >= quizData.length) {
            showResult();
            return;
        }

        document.getElementById('idx-view').innerText = currentIdx + 1;
        const data = quizData[currentIdx];
        document.getElementById('q-text').innerText = data.q;
        const optWrap = document.getElementById('opt-wrap');
        optWrap.innerHTML = "";
        document.getElementById('feedback').style.display = "none";
        document.getElementById('btn-next').style.display = "none";

        data.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = txt;
            b.onclick = () => checkAns(i);
            optWrap.appendChild(b);
        });

        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none'; bar.style.width = '100%';
        setTimeout(() => { bar.style.transition = 'width 10s linear'; bar.style.width = '0%'; }, 50);

        clearInterval(timer);
        timer = setTimeout(() => checkAns(-1), 10000);
    }

    function checkAns(idx) {
        clearTimeout(timer);
        const data = quizData[currentIdx];
        const fb = document.getElementById('feedback');
        fb.style.display = "block";
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

        if (idx === data.c) {
            document.getElementById('sound-o').play();
            fb.innerHTML = `<span style="color:var(--correct); font-weight:700;">✓ 정답입니다!</span><br><br>${data.f}`;
            score++;
        } else {
            document.getElementById('sound-x').play();
            fb.innerHTML = `<span style="color:var(--wrong); font-weight:700;">✕ 오답입니다!</span><br><br>${data.f}`;
            const hp = document.getElementById('hp-view');
            hp.innerText = Math.max(0, parseInt(hp.innerText) - 1);
        }
        document.getElementById('btn-next').style.display = "block";
    }

    function showResult() {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        document.getElementById('res-score').innerText = `${userName} 용사, ${score}점을 획득했습니다.`;
        
        saveRank(userName, score);
        displayRank();
    }

    // 랭킹 저장 함수
    function saveRank(name, finalScore) {
        let ranks = JSON.parse(localStorage.getItem('voca_ranks_s2')) || [];
        ranks.push({ name: name, score: finalScore });
        ranks.sort((a, b) => b.score - a.score); // 내림차순 정렬
        ranks = ranks.slice(0, 5); // 상위 5명만 저장
        localStorage.setItem('voca_ranks_s2', JSON.stringify(ranks));
    }

    // 랭킹 표시 함수
    function displayRank() {
        const ranks = JSON.parse(localStorage.getItem('voca_ranks_s2')) || [];
        const rankList = document.getElementById('rank-list');
        rankList.innerHTML = "";

        if (ranks.length === 0) {
            rankList.innerHTML = "<div style='color:#7f8c8d; font-size:0.8rem;'>아직 모험 기록이 없습니다.</div>";
            return;
        }

        ranks.forEach((r, i) => {
            const item = document.createElement('div');
            item.className = 'rank-item' + (i === 0 ? ' top' : '');
            item.innerHTML = `
                <span>${i + 1}. ${r.name}</span>
                <span>${r.score}점</span>
            `;
            rankList.appendChild(item);
        });
    }

    document.getElementById('btn-next').addEventListener('click', () => {
        currentIdx++;
        loadQuestion();
    });
</script>
</body>
</html>
